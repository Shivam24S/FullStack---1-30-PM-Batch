<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Typography</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="text-center m-5"><h1>Typography</h1></div>

    <div class="container">
      <div class="row">
        <!-- headings -->

        <div class="col">
          <p class="h1">heading-1</p>
          <p class="h2">heading-2</p>
          <p class="h3">heading-3</p>
          <p class="h4">heading-4</p>
          <p class="h5">heading-5</p>
          <p class="h6">heading-6</p>

          <!-- font size -->

          <div class="fs-1">font-size-1</div>
          <div class="fs-2">font-size-2</div>
          <div class="fs-3">font-size-3</div>
          <div class="fs-4">font-size-4</div>
          <div class="fs-5">font-size-5</div>
          <div class="fs-6">font-size-6</div>

          <!-- display -->

          <div class="display-1">display-size-1</div>
          <div class="display-2">display-size-2</div>
          <div class="display-3">display-size-3</div>
          <div class="display-4">display-size-4</div>
          <div class="display-5">display-size-5</div>
          <div class="display-6">display-size-6</div>

          <p class="text-center">this is text-center</p>
          <p class="text-start">this is text-start</p>
          <p class="text-end">this is text-end</p>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
