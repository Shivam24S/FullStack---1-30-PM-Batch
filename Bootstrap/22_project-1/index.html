<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Samsung</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg bg-dark">
        <div class="container-fluid">
          <a class="navbar-brand text-white fw-bold fs-3" href="/"
            >SAMSUNG<span class="fs-1 text-primary">.</span></a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav m-auto mb-2 mb-lg-0 gap-3">
              <li class="nav-item">
                <a
                  class="nav-link active text-secondary"
                  aria-current="page"
                  href="#"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">Mobile</a>
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  TV&AV
                </a>
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">neo QLED 8k </a></li>
                  <li><a class="dropdown-item" href="#">OLED TV</a></li>
                  <li><a class="dropdown-item" href="#">SoundBars</a></li>
                </ul>
              </li>
              <li class="nav-item">
                <a class="nav-link">Explore</a>
              </li>
              <li class="nav-item">
                <a class="nav-link">Support</a>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="📱 Search Samsung"
                aria-label="Search"
              />
              <button class="btn btn-outline-primary">Cart0</button>
            </form>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <div class="container-fluid">
        <div class="row">
          <div class="col">
            <div
              id="carouselExampleAutoplaying"
              class="carousel slide"
              data-bs-ride="carousel"
            >
              <div class="carousel-inner">
                <div class="carousel-item active">
                  <img
                    src="./asset/slider-1.avif"
                    class="img-fluid"
                    alt="slider-1"
                  />
                </div>

                <div class="carousel-item">
                  <img src="./asset/TV.avif" class="img-fluid" alt="slider-2" />
                </div>
                <div class="carousel-item">
                  <img
                    src="./asset/Third.webp"
                    class="img-fluid"
                    alt="slider-3"
                  />
                </div>
              </div>
              <button
                class="carousel-control-prev"
                type="button"
                data-bs-target="#carouselExampleAutoplaying"
                data-bs-slide="prev"
              >
                <span
                  class="carousel-control-prev-icon"
                  aria-hidden="true"
                ></span>
                <span class="visually-hidden">Previous</span>
              </button>
              <button
                class="carousel-control-next"
                type="button"
                data-bs-target="#carouselExampleAutoplaying"
                data-bs-slide="next"
              >
                <span
                  class="carousel-control-next-icon"
                  aria-hidden="true"
                ></span>
                <span class="visually-hidden">Next</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <section id="category">
        <div class="container">
          <div class="section-title d-flex flex-column align-items-center m-4">
            <h6 class="text-info text-uppercase">Explore the Ecosystem</h6>
            <h2>Shop by <span class="text-info">Category</span></h2>
          </div>
          <div class="row">
            <div class="col d-flex gap-4">
              <div
                class="card d-flex justify-content-center p-3 flex-column gap-2 align-items-center"
              >
                <i class="fa-solid fa-mobile icon"></i>
                <div class="card-body text-center">
                  <h5 class="card-title">Galaxy Mobiles</h5>
                  <p class="card-text">S-Series,Z-Series,A-Series</p>
                  <a href="#" class="btn btn-primary">visit</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
