<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col">
          <p class="d-none">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Fuga
            dolores nulla itaque nisi reprehenderit eaque est quis atque sequi
            error.
          </p>
        </div>

        <div class="row">
          <div class="col">
            <h1 class="float-end">this is float</h1>
          </div>
        </div>
      </div>

      <div class="row size-container vh-100">
        <div class="col border border-4 h-25">
          <h1>height</h1>
        </div>

        <div class="col border border-4 w-50">
          <h1>width</h1>
        </div>
      </div>

      <div class="row vh-100">
        <div class="col border border-black vh-50">
          <h1>view-port height 50%</h1>
        </div>

        <div class="col border border-black vw-50">
          <h1>view-port width 50%</h1>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
