<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forms</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container shadow border border-2 mt-3">
      <h1 class="text-center">Form</h1>
      <div class="row">
        <div class="col">
          <form>
            <div class="m-3">
              <label for="name">Name</label>
              <input type="text" placeholder="enter your name" />
            </div>

            <div class="m-3">
              <label for="name" class="form-lable">Name</label>
              <input
                type="text"
                class="form-control"
                placeholder="enter your name"
              />
            </div>

            <div class="m-3">
              <label for="email" class="form-lable">Email</label>
              <input
                type="email"
                class="form-control"
                value="example@gmail.com"
                readonly
              />
            </div>

            <div class="m-3">
              <label for="number" class="form-lable">Number</label>
              <input type="number" class="form-control" />
              <small class="form-text text-muted">+91 only</small>
            </div>

            <div class="m-3">
              <input type="checkbox" class="form-check-input" />
              <label for="check" class="form-check-label"
                >I agree terms and conditions</label
              >
            </div>

            <div class="m-3">
              <input type="radio" class="form-check-input" name="answer" />
              <label for="check" class="form-check-lable">Yes</label>
              <input type="radio" class="form-check-input" name="answer" />
              <label for="check" class="form-check-lable">No</label>
            </div>

            <div class="m-3">
              <label for="city" class="form-lable-lg">city</label>
              <input
                type="text"
                class="form-control form-control-lg"
                placeholder="enter your city"
              />
            </div>

            <div class="m-3">
              <label for="city" class="form-lable-sm">street-Name</label>
              <input
                type="text"
                class="form-control form-control-sm"
                placeholder="enter your streetName"
              />
            </div>

            <div class="m-3">
              <label for="city" class="form-lable">state-Name</label>
              <input
                type="text"
                class="form-control form-control"
                placeholder="enter your state"
              />
            </div>

            <div class="m-3">
              <input
                type="text"
                list="dataList"
                placeholder="search"
                class="form-control"
              />
              <datalist id="dataList">
                <option value="Mumbai">Mumbai</option>
                <option value="Delhi">Delhi</option>
                <option value="bangalore">bangalore</option>
                <option value="Ahmadabad">Ahmadabad</option>
              </datalist>
            </div>

            <div class="m-3">
              <label for="address" class="form-label">Address</label>
              <textarea name="address" rows="5" cols="5" class="form-control">
              </textarea>
            </div>

            <div class="m-3 form-floating">
              <input
                type="password"
                placeholder="password"
                id="floatingInput"
                name="password"
                class="form-control"
              />
              <label for="floatingInput">Password</label>
            </div>

            <div class="m-3">
              <label class="form-label"> range </label>
              <input type="range" class="form-range" />
            </div>

            <div class="m-3">
              <label for="file" class="form-label">File</label>
              <input type="file" class="form-control form-file" />
            </div>
          </form>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
