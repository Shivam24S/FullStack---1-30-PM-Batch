<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Images</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="row row-cols-3">
        <div class="col-md-4">
          <img
            class="img-fluid"
            src="https://images.pexels.com/photos/268533/pexels-photo-268533.jpeg"
            alt="nature-1"
          />
        </div>
        <div class="col-md-4">
          <img
            class="img-thumbnail"
            src="https://images.pexels.com/photos/122429/leaf-nature-green-spring-122429.jpeg"
            alt="n-2"
          />
        </div>
        <div class="col-md-4">
          <img
            class="img-fluid rounded-5"
            src="https://images.pexels.com/photos/3408744/pexels-photo-3408744.jpeg"
            alt="n-3"
          />
        </div>

        <div class="col-md-4">
          <img
            class="img-fluid rounded-pill"
            src="https://images.pexels.com/photos/33109/fall-autumn-red-season.jpg"
            alt="n-3"
          />
        </div>

        <div class="col-md-4">
          <img
            class="img-fluid rounded-top-5"
            src="https://images.pexels.com/photos/36717/amazing-animal-beautiful-beautifull.jpg"
            alt="n-3"
          />
        </div>

        <div class="col-md-4">
          <img
            class="img-fluid rounded-circle"
            src="https://images.pexels.com/photos/443446/pexels-photo-443446.jpeg"
            alt="n-3"
          />
        </div>

        <div class="col-md-4 float-start">
          <img
            class="img-fluid rounded-5"
            src="https://images.pexels.com/photos/459225/pexels-photo-459225.jpeg"
            alt="n-3"
          />
        </div>

        <div class="col-md-4 mx-auto d-block">
          <img
            class="img-fluid rounded-3"
            src="https://images.pexels.com/photos/458983/pexels-photo-458983.jpeg"
            alt="n-3"
          />
        </div>

        <div class="col-md-4 float-end">
          <img
            class="img-fluid rounded-4"
            src="https://images.pexels.com/photos/189349/pexels-photo-189349.jpeg"
            alt="n-3"
          />
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
